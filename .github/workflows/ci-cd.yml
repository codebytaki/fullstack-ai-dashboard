name: CI/CD

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Lint + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist-${{ github.run_id }}
          path: frontend/dist
          retention-days: 7

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit safety pytest pytest-asyncio httpx

      - name: Ruff lint
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Bandit security scan
        run: bandit -r app/ -ll -f json -o bandit-report.json
        continue-on-error: true

      - name: Safety check
        run: safety check --json
        continue-on-error: true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-security-${{ matrix.python-version }}-${{ github.run_id }}
          path: backend/bandit-report.json
          if-no-files-found: ignore

  # ── Docker Build ──────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: nexusai-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: nexusai-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
